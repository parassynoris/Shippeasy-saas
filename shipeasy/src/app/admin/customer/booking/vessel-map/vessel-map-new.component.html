<section class="content-section common-pd p-3">
    <div *ngIf="showIcon" class="container d-flex justify-content-between align-items-center pb-3 font-size">
        <div class=" pt-1"> Vessel - {{vesselName}}</div>
        <div><button type="button" class="btn-close shadow-none" (click)="onClose()" aria-label="Close"></button></div>
    </div>
    <div *ngIf="vesseltrack" class="mapcontainer">
        <iframe name="marinetraffic" id="marinetraffic" width="100%" height="650" scrolling="no" frameborder="1"
            [src]="url">
            Browser does not support embedded objects.<br />Visit directly
            <a href="http://www.marinetraffic.com/">www.marinetraffic.com</a>
        </iframe>
    </div>
    
</section>
