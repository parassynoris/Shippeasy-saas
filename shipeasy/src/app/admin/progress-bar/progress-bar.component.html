<div class="custom-progress" *ngIf="Data?.openIssues?.length <= 0">
    <div class="progress ">
        <div class="progress-bar" role="progressbar" [style]="'width : ' + val + '%'" aria-valuenow="25"
            aria-valuemin="0" aria-valuemax="100"></div>
    </div>
    <i class="bi bi-chevron-right"></i>
</div>


<div class="custom-progress-red" *ngIf="Data?.openIssues?.length > 0">
    <div class="progress">
        <div class="progress-bar" role="progressbar" [style]="'width : ' + val + '%'" aria-valuenow="25"
            aria-valuemin="0" aria-valuemax="100"></div>
    </div>
    <i class="bi bi-chevron-right"></i>
</div>
