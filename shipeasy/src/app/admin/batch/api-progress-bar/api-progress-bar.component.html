<div class="progress-bar-container" *ngIf="percentage > 0 && percentage < 100">
    <div class="progress-wrapper">
      <div class="progress-bar-bg">
        <div 
          class="progress-bar-fill" 
          [style.width.%]="percentage"
          [style.background-color]="getStatusColor()"
        >
          <span class="progress-text" *ngIf="percentage > 10"></span>
        </div>
      </div>
      <span class="progress-text-outside" *ngIf="percentage <= 10"></span>
    </div>
