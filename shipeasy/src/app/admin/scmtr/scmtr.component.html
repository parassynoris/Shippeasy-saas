<p>scmtr works!</p>
<div class="table-with-gheading">
    <div class="wrapper">
      <div class="container-fluid">
        <div class="wrap-content">
          <div class="row">
            <div class="col-sm-12 bottom-alignment-view">
              <div class="page-title-box">
                <div class="btn-group mt-2">
                  <ol class="breadcrumb hide-phone p-0 m-0">
                    <!-- <li class="breadcrumb-item"> {{ 'stolt.heading' | translate }}</li> -->
                    <li class="breadcrumb-item active">{{'stolt.scmtr.heading' | translate}}</li>
                  </ol>
                </div>
              </div>
  
              <div class="wrap-bar">
                <div class="wrap-left">
                  <h1>{{holdControl}}</h1>
                </div>
                <div class="tab-design-change">
                <div class="wrap-right custome-tab">
                  <ul class="nav nav-tabs nav-rght" id="myTab" role="tablist">
                    <li class="nav-item" role="presentation" *ngFor="let tab of tabs">
                      <button class="nav-link" [class.active]="holdControl === tab.key" id="{{tab.id}}"
                        data-bs-toggle="tab" data-bs-target="#{{tab.control}}" type="button" role="tab"
                        aria-controls="{{tab.control}}" aria-selected="true" (click)="onTab(tab)">{{tab.name}}</button>
                    </li>
                  </ul>
                </div>
                </div>
                
              </div>
  
              <div class="tab-content" id="myTabContent">
                <div *ngIf="holdControl === 'vessel'" [class.active]="holdControl === 'vessel'" class="tab-pane fade show"
                  id="vessel" role="tabpanel" aria-labelledby="vessel-tab">
                  <app-vessel></app-vessel>
                </div>

              </div>
  
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
