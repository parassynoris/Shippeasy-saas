<ng-container *ngIf="currentUrl === 'shipping-bill'">
    <div class="mat-table-with-gheading">
        <div class="wrapper">
            <div class="">
                <div class="">
                    <div class="wrap-mat-table-area">
                        <div class="table-header-area pt-3">
                            <div>
                                <table-filters [TDP]="[false, false, true, true]" (filterInput)="applyFilter($event)"
                                    (onClickExport)="exportAsExcelFile()">
                                </table-filters>
                            </div>
                            <div class="header-right">
                                <a  title="Add Shipping Bill Details"
                                    class="max-con new-action  btn btn-outline-primary btn-sm rounded-pill"
                                    (click)="addDetails()">Add</a>
                            </div>
                        </div>
    
                        <div class="table-card">
                            <div class="table-design example-container mat-elevation-z8">
                                <table mat-table [dataSource]="dataSource" matSort class="" summary="agreement">
    
                                    <ng-container matColumnDef="#">
                                        <th scope="col" mat-header-cell *matHeaderCellDef>
                                            # <em class="custom-tooltip" [attr.title]="'Toggle Filters'"
                                                (click)="toggleFilters = !toggleFilters" class="bi bi-search"></em>
                                        </th>
                                        <td mat-cell *matCellDef="let element;let i = index">
                                            {{ element?.id}}
                                        </td>
                                    </ng-container>
    
                                    <ng-container matColumnDef="shippingbillNo">
                                        <th scope="col" mat-header-cell *matHeaderCellDef mat-sort-header>
                                            Shipping Bill No
                                        </th>
                                        <td class="" mat-cell *matCellDef="let element">
                                           {{element?.shippingbillNo}}
                                        </td>
                                    </ng-container>
    
                                    <ng-container matColumnDef="createdOn">
                                        <th scope="col" mat-header-cell *matHeaderCellDef mat-sort-header>
                                            Created On
                                        </th>
                                        <td mat-cell *matCellDef="let element">
                                            {{ element?.createdOn | date:"dd/MM/YYYY hh:mm:ss"}}
                                        </td>
                                    </ng-container>
    
                                    <ng-container matColumnDef="action">
                                        <th scope="col" id="action" class="charterersPdfHead" mat-header-cell  
                                            *matHeaderCellDef>
                                            {{ 'Actions' }}
                                        </th>
                                        <td class="borderBottom" mat-cell *matCellDef="let element">
                                            <div class="d-flex justify-content-center">
                                                <span class="mtop mr-1" nz-tooltip
                                                nzTooltipTitle="{{ 'common.download' | translate }}"><a>
                                                  <em class="bi bi-printer" style="color: #007BFF;" (click)="print(element)"></em></a>
                                              </span>
                                                <span nz-tooltip nzTooltipTitle="{{ 'common.edit' | translate }}"
                                                    class="mtop boot-icon">
                                                    <a appAccessControl featureCode="['STM0116']" accessType="update"
                                                        (click)="onenMap(element)"><em
                                                            class="bi bi-pencil color-pencil-red"></em></a>
                                                </span>
                                                <span nz-tooltip nzTooltipTitle="{{ 'common.delete' | translate }}"
                                                    class="mtop">
                                                    <a   (click)="onDelete(deletedata,element)" appAccessControl featureCode="['STM0116']" accessType="delete"><i class="bi bi-trash color-pencil-red"></i></a>
                                                </span>
                                            </div>
                                        </td>
                                    </ng-container>
    
                                    <ng-container *ngFor="let headersFilter of displayedColumns1; let i=index"
                                        [matColumnDef]="headersFilter">
                                        <th mat-header-cell *matHeaderCellDef [class.display-none]="toggleFilters">
                                            <div class="filters-container" [class.animate]="!toggleFilters">
                                                <div *ngIf="i > 0 && i < displayedColumns1.length - 1" appearance="outline">
                                                    <input class="form-control input-txt"
                                                        placeholder="Press 'Enter' to search" [(ngModel)]="filtersModel[i]"
                                                        (keyup.enter)="searchColumns()">
                                                </div>
                                                <em *ngIf="i == displayedColumns1.length - 1" class="custom-tooltip"
                                                    [attr.title]="'Clear Filters'"
                                                    (click)="clearFilters();toggleFilters = !toggleFilters"
                                                    class="bi bi-x-circle"></em>
                                            </div>
                                        </th>
                                    </ng-container>
    
    
                                    <tr mat-header-row class="header-height" *matHeaderRowDef="displayedColumns"></tr>
                                    <tr mat-header-row class="no-default-height" *matHeaderRowDef="displayedColumns1"></tr>
                                    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
                                    <tr class="mat-row" *matNoDataRow>
                                        <td class="mat-cell" [attr.colspan]="displayedColumns.length" class="text-center">
                                            <span *ngIf="loaderService?.isLoadingcircle">{{_gc?.LOADER_TEXT}}</span>
                                            <span *ngIf="!loaderService?.isLoadingcircle && !dataSource?.data?.length">No data available</span>
                                        </td>
                                    </tr>
                                </table>
    
                            </div>
                            <div [ngClass]="{'display-none' : dataSource.filteredData.length < 10}">
                                <mat-paginator [pageSizeOptions]="pagenation" showFirstLastButtons aria-label="Select page">
                                </mat-paginator>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</ng-container>
<ng-container *ngIf="currentUrl === 'add' || currentUrl === 'edit' || currentUrl === 'show'">
    <app-add-shipping-bill [isType]="currentUrl" (CloseBillSection)="onBillAction($event)" ></app-add-shipping-bill>
  </ng-container>

  <ng-template #deletedata let-c="close" let-d="dismiss">
    <div class="modal-content">
        <div class="modal-header">
            <button type="button" class="btn-close shadow-none" aria-label="Close" (click)="d('Cross click')"></button>
        </div>
        <div class="modal-body mt-4 d-flex align-items-center">
            <em class="bi bi-question-circle text-danger fs-2 text-center float-start me-2"> </em> <span
                class=" text-dark fs-6"> {{ "error.msg_delete" | translate }}</span>
        </div>
        <div class="modal-footer">
            <div class="text-center">
                <button type="button" class="btn btn-secondary btn-sm me-3" (click)="d('Cross click')">
                    {{ "common.no" | translate }}
                </button>
                <button type="button" class="btn btn-danger btn-sm" (click)="c('yes')">
                    {{ "common.yes" | translate }}
                </button>
            </div>
        </div>
    </div>
</ng-template>
