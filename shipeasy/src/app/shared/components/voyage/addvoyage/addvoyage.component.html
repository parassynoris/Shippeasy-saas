<div class="table-with-gheading">

              <option value="100">100</option>

            </thead>
            <tbody>

                  <td>{{voyage.voyage_id}}</td>
                  <td>{{voyage.sequence}}</td>
                  <td><input type="date" class="form-control custom-input border-0" placeholder="Product Id" value="362"></td>

                        </div>
                        </div>
                      </div>

                    </div>
