<div class="from">
    <form [formGroup]="myForm" >
        <div class="form-group">
            <label for="loopin" class="form-label1">Loop In:</label>
            <input formControlName="loopin" type="text" class="form-control custom-input" id="loopin" placeholder="">
        </div>

        <div class="form-group">
            <label for="to" class="form-label">To:<span class="text-danger">*</span></label>
            <input formControlName="to" type="email" class="form-control custom-input" id="to" [ngClass]="{'is-invalid': submitted && f.to.errors}" >
            <div *ngIf="submitted && f.to.errors" class="invalid-feedback">
                <div *ngIf="f.to.errors.required">To is required.</div>
                <div *ngIf="f.to.errors.email">Invalid email format.</div>
              </div>
        </div>

        <div class="form-group">
            <label for="cc" class="form-label">CC:</label>
            <input formControlName="cc" type="email" class="form-control custom-input" id="cc">
        </div>

        <div class="form-group">
            <label for="subject" class="form-label">Subject:<span class="text-danger">*</span></label>
            <input formControlName="subject" type="text" class="form-control custom-input" id="subject" [ngClass]="{'is-invalid': submitted && f.subject.errors}">
            <div *ngIf="submitted && f.subject.errors" class="invalid-feedback">
                <div *ngIf="f.subject.errors.required">Subject is required.</div>
              </div>
        </div>        

        <div class="file-upload-container" (dragover)="onDragOver($event)" (drop)="onDrop($event)">
            <input type="file" multiple (change)="onFileSelected($event)" #fileInput style="display: none;"
                accept=".pdf,.doc,.docx,.xls,.xlsx">
            <p>Drag and drop files here, or <a href="javascript:void(0);" (click)="fileInput.click()">click to select
                    files</a> (PDF, DOC, DOCX, XLS, XLSX only)</p>
        </div>
        <div id="selectedDocumentContainer" *ngIf="selectedFileName && selectedFileName.length > 0"
            class="document-container">
            <div class="file-container" *ngFor="let fileName of selectedFileName; let i = index">
                <div class="file-details">
                    <input type="checkbox" class="file-checkbox" (click)="selectFile(fileName.name,$event,i,fileName.upload, fileName)" >
                    <p>{{ fileName?.name }}</p>
                </div>
                <a (click)="deleteRow(i)" *ngIf="fileName?.upload" >
                    <mat-icon>delete</mat-icon>
                </a>
            </div>
        </div>

        <div class="modal-header">
            <button class="btn btn-outline-primary btn-lg float-end" id="button" data-bs-dismiss="modal"
          type="submit"
                (click)="uploadDocuments()">
                {{ 'smartagent.portenquiry.document.uploadDocument' | translate }}
            </button>
            <button  class="button1 btn btn-outline-primary btn-lg float-end"  type="submit" (click)="onSave()" aria-label="Close">Send</button>
            <button type="button" class="button1 btn-lg float-end btn1" (click)="onClose()" aria-label="Close">Close</button>
        </div>
    </form>
    
</div>
