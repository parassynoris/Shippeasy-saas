<div class="container">

    <!-- LEFT -->
    <div class="card">
        <div class="header">
            <div class="icon">
                <span class="material-icons">add</span>
            </div>
            <div>
                <h2>Create New Release</h2>
                <p>Next Version: 1.0.2</p>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Customer Group</label>
                <select>
                    <option value="" selected disabled>Select Customer Group</option>
                    <option>Freight Forwarders</option>
                    <option>Warehouse</option>
                    <option>Transport</option>
                    <option>All</option>
                </select>
            </div>

            <div class="form-group">
                <label>Release Type</label>
                <select>
                    <option value="" selected disabled>Select Release Type</option>
                    <option>Production Issue</option>
                    <option>Critical Security Issue</option>
                    <option>New Feature</option>
                    <option>Enhancement</option>
                    <option>Bug Fix</option>
                    <option>Performance Improvement</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Release Notes</label>
            <textarea placeholder="Enter detailed release notes..."></textarea>
        </div>

        <div class="button">
            <button class="btn">Create Release</button>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="card">
        <div class="history-header">
            <div class="icon">
                <i class="fa fa-clock-o"></i>
            </div>
            <div>
                <h3>Release History</h3>
                <span>2 total releases</span>
            </div>
        </div>

        <div class="release-item">
            <div class="status-icon danger">
                <span class="material-icons">report_problem</span>
            </div>
            <div class="release-content">
                <div class="release-title">
                    <strong>v1.0.1</strong>
                    <div class="decs">
                        <span class="badge badge-orange">Transport</span>
                        <span class="badge badge-red">Critical Security Issue</span>
                    </div>
                </div>
                <div class="meta">January 29, 2026 at 04:41 PM</div>
                <div class="desc">Security issue fix</div>
            </div>
        </div>

        <div class="release-item">
            <div class="status-icon success">
                <span class="material-icons">trending_up</span>
            </div>
            <div class="release-content">
                <div class="release-title">
                    <strong>v1.0.0</strong>
                    <div class="decs">
                        <span class="badge badge-sky">Freight Forwarders</span>
                        <span class="badge badge-green">Enhancement</span>
                    </div>
                </div>
                <div class="meta">January 29, 2026 at 04:40 PM</div>
                <div class="desc">We release import containers changes</div>
            </div>
        </div>
    </div>

</div>
