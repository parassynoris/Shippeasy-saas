AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Shippeasy SaaS — Logistics & Freight Management Platform.
  Launches a single EC2 instance with the full Shippeasy stack
  (Angular frontend, Node.js API, MongoDB) via Docker Compose.

# ══════════════════════════════════════════════════════════════════
# Parameters — presented to the buyer during CloudFormation launch
# ══════════════════════════════════════════════════════════════════
Parameters:
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.medium
      - t3.large
      - t3.xlarge
      - m5.large
      - m5.xlarge
    Description: EC2 instance type (t3.medium recommended for up to 50 users)

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: SSH key pair for instance access

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to launch the instance in

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet to launch the instance in

  JWTSecret:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: JWT signing secret (minimum 16 characters — keep this safe)

  AllowedSSHCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: >
      CIDR block allowed for SSH access (e.g., 203.0.113.0/24).
      Use 0.0.0.0/0 only for testing; restrict in production.

# ══════════════════════════════════════════════════════════════════
# Mappings — AMI IDs per region (replace after each Packer build)
# ══════════════════════════════════════════════════════════════════
Mappings:
  RegionAMI:
    us-east-1:
      AMI: ami-PLACEHOLDER
    us-west-2:
      AMI: ami-PLACEHOLDER
    eu-west-1:
      AMI: ami-PLACEHOLDER
    ap-south-1:
      AMI: ami-PLACEHOLDER

# ══════════════════════════════════════════════════════════════════
# Resources
# ══════════════════════════════════════════════════════════════════
Resources:

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Shippeasy SaaS — HTTP, HTTPS, SSH
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSSHCidr
          Description: SSH

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionAMI, !Ref "AWS::Region", AMI]
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref SecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 50
            VolumeType: gp3
            Encrypted: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail

          # Write production environment variables
          cat > /opt/shipeasy/.env <<'ENVEOF'
          NODE_ENV=production
          FRONTEND_PORT=80
          BACKEND_PORT=3000
          MONGO_DB_NAME=shipeasy
          SECRET_KEY_JWT=${JWTSecret}
          CORS_ORIGINS=http://localhost
          FRONTEND_URL=http://localhost
          ENABLE_SWAGGER=false
          ENCRYPTION=false
          LOG_LEVEL=info
          BACKEND_URL=http://backend:3000
          API_URL=/api
          API_URL_MASTER=/api/
          SOCKET_URL=
          BACKEND_IMAGE=shipeasy-api
          FRONTEND_IMAGE=shipeasy-frontend
          BACKEND_TAG=latest
          FRONTEND_TAG=latest
          ENVEOF

          # Start the application
          systemctl start shipeasy
      Tags:
        - Key: Name
          Value: Shippeasy-SaaS

# ══════════════════════════════════════════════════════════════════
# Outputs — shown after stack creation
# ══════════════════════════════════════════════════════════════════
Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref Instance

  PublicIP:
    Description: Public IP address of the Shippeasy instance
    Value: !GetAtt Instance.PublicIp

  ApplicationURL:
    Description: Shippeasy application URL
    Value: !Sub "http://${Instance.PublicIp}"

  HealthCheckURL:
    Description: Health check endpoint
    Value: !Sub "http://${Instance.PublicIp}/health"
