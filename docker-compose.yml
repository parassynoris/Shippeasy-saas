# ══════════════════════════════════════════════════════════════════
# Shippeasy — Docker Compose (single-file full-stack setup)
#
# Quick start:
#   cp .env.example .env          # copy and optionally edit
#   docker compose up --build     # build from source & start
#
# CI/CD (pre-built images from ACR):
#   BACKEND_TAG=abc1234 FRONTEND_TAG=abc1234 docker compose up -d --no-build
# ══════════════════════════════════════════════════════════════════

networks:
  shipeasy_net:
    driver: bridge

volumes:
  mongo_data:
  logs_data:

services:

  # ─────────────────────────────────────────────
  # MongoDB 6
  # ─────────────────────────────────────────────
  mongo:
    image: mongo:6
    container_name: shipeasy_mongo
    restart: unless-stopped
    networks:
      - shipeasy_net
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-shipeasy}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────
  # Backend API (Node.js / Express)
  # ─────────────────────────────────────────────
  backend:
    # CI/CD sets BACKEND_IMAGE + BACKEND_TAG → pulls pre-built image.
    # Local dev with --build ignores the `image:` field and builds from source.
    image: ${BACKEND_IMAGE:-shipeasy-api}:${BACKEND_TAG:-latest}
    build:
      context: ./shipeasy-api
      dockerfile: Dockerfile
    container_name: shipeasy_api
    restart: unless-stopped
    networks:
      - shipeasy_net
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      # ── Required ────────────────────────────────────────────────
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      MONGO_CONNECTION: mongodb://mongo:27017/${MONGO_DB_NAME:-shipeasy}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-shipeasy}
      SECRET_KEY_JWT: ${SECRET_KEY_JWT:-change-me-in-production}
      # ── Optional overrides (safe defaults) ──────────────────────
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      ENCRYPTION: ${ENCRYPTION:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - logs_data:/app/logs

  # ─────────────────────────────────────────────
  # Frontend (Angular → nginx)
  # ─────────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-shipeasy-frontend}:${FRONTEND_TAG:-latest}
    build:
      context: ./shipeasy
      dockerfile: Dockerfile
      args:
        ENVIRONMENT: ${NODE_ENV:-production}
        API_URL: ${API_URL:-/api}
        API_URL_MASTER: ${API_URL_MASTER:-/api/}
        SOCKET_URL: ${SOCKET_URL:-}
    container_name: shipeasy_frontend
    restart: unless-stopped
    networks:
      - shipeasy_net
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:3000}
