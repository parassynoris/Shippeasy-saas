version: "3.9"

# All variables are read from the root .env file (copy .env.example → .env).
# Nothing is hardcoded — safe to commit this file as-is.
#
# LOCAL DEV (build from source):
#   docker compose up --build
#
# CI/CD DEPLOY (pull pre-built images, no rebuild):
#   BACKEND_TAG=abc1234 FRONTEND_TAG=abc1234 docker compose up -d --no-build

networks:
  shipeasy_net:
    driver: bridge

volumes:
  mongo_data:
  logs_data:

services:

  # ─────────────────────────────────────────────
  # MongoDB
  # ─────────────────────────────────────────────
  mongo:
    image: mongo:6
    container_name: shipeasy_mongo
    restart: unless-stopped
    networks:
      - shipeasy_net
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-shipeasy}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "${MONGO_CPU_LIMIT:-2.0}"
          memory: ${MONGO_MEMORY_LIMIT:-1G}
        reservations:
          cpus: "0.5"
          memory: 256M
    security_opt:
      - no-new-privileges:true

  # ─────────────────────────────────────────────
  # Backend API
  # ─────────────────────────────────────────────
  backend:
    # CI/CD sets BACKEND_IMAGE + BACKEND_TAG → pulls pre-built image.
    # Local dev with --build ignores the `image:` field and builds from source.
    image: ${BACKEND_IMAGE:-shipeasy-api}:${BACKEND_TAG:-latest}
    build:
      context: ./shipeasy-api
      dockerfile: Dockerfile
    container_name: shipeasy_api
    restart: unless-stopped
    networks:
      - shipeasy_net
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    env_file:
      - ./shipeasy-api/.env
    environment:
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      MONGO_URI: mongodb://mongo:27017/${MONGO_DB_NAME:-shipeasy}
    volumes:
      - logs_data:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "${BACKEND_CPU_LIMIT:-1.0}"
          memory: ${BACKEND_MEMORY_LIMIT:-512M}
        reservations:
          cpus: "0.25"
          memory: 128M
    security_opt:
      - no-new-privileges:true

  # ─────────────────────────────────────────────
  # Frontend (Angular → nginx)
  # ─────────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-shipeasy-frontend}:${FRONTEND_TAG:-latest}
    build:
      context: ./shipeasy
      dockerfile: Dockerfile
      args:
        ENVIRONMENT: ${NODE_ENV:-production}
        API_URL: ${API_URL:-/api}
        API_URL_MASTER: ${API_URL_MASTER:-/api/}
        SOCKET_URL: ${SOCKET_URL:-}
    container_name: shipeasy_frontend
    restart: unless-stopped
    networks:
      - shipeasy_net
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:3000}
    deploy:
      resources:
        limits:
          cpus: "${FRONTEND_CPU_LIMIT:-0.5}"
          memory: ${FRONTEND_MEMORY_LIMIT:-256M}
        reservations:
          cpus: "0.1"
          memory: 64M
    security_opt:
      - no-new-privileges:true
